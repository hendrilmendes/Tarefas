name: tarefas
description: "Um app para você salvar suas tarefas e anotações do dia a dia"
publish_to: 'none'

version: 3.0.6+20251112

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

# App Settings
  app_settings: ^7.0.0

# Connectivity Plus
  connectivity_plus: ^7.0.0

# Cupertino Icons  
  cupertino_icons: ^1.0.8

# Device Plus
  device_info_plus: ^12.3.0

# Disable Battery Optimization
  disable_battery_optimization: ^1.1.2

# Dynamic Colors
  dynamic_color: ^1.8.1
  
# Firebase
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.0
  firebase_core: ^4.1.1
  firebase_crashlytics: ^5.0.2
  firebase_performance: ^0.11.1

# Flutter Local Notifications
  flutter_local_notifications: ^19.5.0

# Google
  google_fonts: ^8.0.1
  google_sign_in: ^7.2.0

# HTTP
  http: ^1.4.0

# Intl
  intl: ^0.20.0

# Package Info
  package_info_plus: ^9.0.0

# Path Provider
  path_provider: ^2.1.5

# Provider
  provider: ^6.1.5

# Share Plus
  share_plus: ^12.0.0

# Shared Preferences
  shared_preferences: ^2.5.3

# Shorebird
  shorebird_code_push: ^2.0.5

# Timezone
  timezone: ^0.10.1

# Url Launcher
  url_launcher: ^6.3.1

# Wiredash
  wiredash: ^2.5.0

  flutter_localizations:
    sdk: flutter
    
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/img/
    - shorebird.yaml
